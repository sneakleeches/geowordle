<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GeoWordle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <p class="eyebrow">Geocaching Puzzle Game</p>
      <h1>GeoWordle</h1>
      <p class="subtitle">Crack a hidden geocaching word in 6 tries. Every round picks a fresh target from the themed word bank.</p>
      <div class="status-row">
        <div class="chip">
          <span class="chip-label">Attempts</span>
          <span id="attempts-left" class="chip-value">6 left</span>
        </div>
        <div class="chip">
          <span class="chip-label">Word Length</span>
          <span id="word-length" class="chip-value">0 letters</span>
        </div>
      </div>
    </header>

    <main class="game-panel">
      <section class="board-wrap" aria-label="Game board">
        <div id="board" class="board"></div>
      </section>

      <section class="controls">
        <div class="message-bar" aria-live="polite">
          <span id="message">Loading a geocaching word...</span>
        </div>

        <div class="keyboard-wrap">
          <div id="keyboard" class="keyboard" aria-label="On-screen keyboard"></div>
        </div>

        <div class="action-row">
          <button id="new-game-button" class="secondary-button" type="button">New Random Word</button>
        </div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 id="modal-title">Nice find</h2>
      <p id="modal-body">The keyword is <strong>SIGNAL</strong>.</p>
      <div class="modal-actions">
        <button id="play-again-button" class="primary-button" type="button">Play Again</button>
      </div>
    </div>
  </div>

  <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
